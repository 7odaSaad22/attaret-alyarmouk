<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم الطلب بنجاح — عطارة اليرموك</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d'},accent:{50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309',800:'#92400e',900:'#78350f'}}}}}</script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50 text-gray-800">
  <div id="navbar"></div>
  <main class="max-w-lg mx-auto px-4 py-16 text-center">
    <div class="bg-white rounded-2xl shadow p-10">
      <div class="text-6xl mb-4">✅</div>
      <h1 class="text-2xl font-extrabold mb-2">تم تأكيد طلبك بنجاح!</h1>
      <p id="order-num" class="text-gray-500 mb-6"></p>
      <p class="text-gray-600 mb-6">سيتم التواصل معك قريبًا لتأكيد الطلب والتوصيل. الدفع عند الاستلام.</p>
      <div class="space-y-3">
        <a id="wa-link" href="#" target="_blank" class="block bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-xl font-bold transition">📱 أرسل الطلب على واتساب</a>
        <a id="track-link" href="/track-order.html" class="block bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-xl font-bold transition">📦 تتبع حالة طلبك</a>
        <a href="/" class="block text-primary-600 font-bold hover:underline py-2">← متابعة التسوق</a>
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    initPage();
    const params = new URLSearchParams(location.search);
    const orderId = params.get('id');
    const waUrl = params.get('wa');
    if (orderId) {
      document.getElementById('order-num').textContent = 'رقم الطلب: #' + orderId;
      document.getElementById('track-link').href = '/track-order.html?id=' + orderId;
    }
    if (waUrl) document.getElementById('wa-link').href = decodeURIComponent(waUrl);
  </script>
</body>
</html>
