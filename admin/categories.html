<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة التصنيفات — عطارة اليرموك</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d'}}}}}</script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-100 text-gray-800">
  <nav class="bg-white shadow px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3"><a href="/admin/" class="text-gray-400 hover:text-primary-600">→</a><span class="font-extrabold text-primary-700">📂 إدارة التصنيفات</span></div>
    <button onclick="logout()" class="text-red-500 hover:text-red-700 text-sm font-bold">خروج</button>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-xl font-extrabold" id="count-title">التصنيفات</h1>
      <button onclick="document.getElementById('add-form').classList.toggle('hidden')" class="bg-primary-600 hover:bg-primary-700 text-white px-4 py-2 rounded-xl font-bold text-sm transition">+ إضافة تصنيف</button>
    </div>

    <form id="add-form" class="hidden bg-white rounded-2xl shadow p-6 mb-6 space-y-4" onsubmit="addCategory(event)">
      <h2 class="font-bold text-lg">إضافة تصنيف جديد</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input id="c-name" required placeholder="اسم التصنيف *" class="border rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-500 outline-none">
        <input id="c-image" placeholder="إيموجي (مثال: 🌿)" class="border rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-500 outline-none">
      </div>
      <input id="c-desc" placeholder="وصف التصنيف (اختياري)" class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-500 outline-none">
      <button type="submit" class="bg-primary-600 hover:bg-primary-700 text-white px-6 py-2 rounded-xl font-bold transition">إضافة</button>
    </form>

    <div id="cats-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"><div class="loader col-span-full"></div></div>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script>
    if (!localStorage.getItem('admin_logged')) location.href = '/admin/login.html';
    function logout() { localStorage.removeItem('admin_logged'); location.href = '/admin/login.html'; }

    async function loadCategories() {
      const { data } = await db.from('Category').select('*, Product(id)');
      document.getElementById('count-title').textContent = `التصنيفات (${data?.length || 0})`;
      document.getElementById('cats-list').innerHTML = (data && data.length)
        ? data.map(c => `
          <div class="bg-white rounded-2xl shadow p-6 flex items-center justify-between">
            <div>
              <div class="text-3xl mb-1">${c.image || '🌿'}</div>
              <h3 class="font-bold">${c.name}</h3>
              <p class="text-sm text-gray-400">${c.Product?.length || 0} منتج</p>
            </div>
            <button onclick="deleteCat(${c.id})" class="text-red-400 hover:text-red-600 text-lg">✕</button>
          </div>`).join('')
        : '<p class="text-gray-400 text-center col-span-full py-10">لا توجد تصنيفات</p>';
    }

    async function addCategory(e) {
      e.preventDefault();
      const name = document.getElementById('c-name').value;
      const slug = name.replace(/\s+/g, '-').toLowerCase() + '-' + Date.now();
      await db.from('Category').insert({
        name, slug,
        image: document.getElementById('c-image').value || '',
        description: document.getElementById('c-desc').value || ''
      });
      document.getElementById('c-name').value = '';
      document.getElementById('c-image').value = '';
      document.getElementById('c-desc').value = '';
      document.getElementById('add-form').classList.add('hidden');
      loadCategories();
    }

    async function deleteCat(id) {
      if (!confirm('حذف التصنيف؟ (لن يتم حذف التصنيف إذا كان يحتوي على منتجات)')) return;
      const { error } = await db.from('Category').delete().eq('id', id);
      if (error) alert('لا يمكن حذف التصنيف — فيه منتجات مرتبطة');
      loadCategories();
    }

    loadCategories();
  </script>
</body>
</html>
