<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة الطلبات — عطارة اليرموك</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d'}}}}}</script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-100 text-gray-800">
  <nav class="bg-white shadow px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3"><a href="/admin/" class="text-gray-400 hover:text-primary-600">→</a><span class="font-extrabold text-primary-700">🧾 إدارة الطلبات</span></div>
    <button onclick="logout()" class="text-red-500 hover:text-red-700 text-sm font-bold">خروج</button>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-xl font-extrabold mb-6" id="count-title">الطلبات</h1>
    <div id="orders-list" class="space-y-4"><div class="loader"></div></div>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script>
    if (!localStorage.getItem('admin_logged')) location.href = '/admin/login.html';
    function logout() { localStorage.removeItem('admin_logged'); location.href = '/admin/login.html'; }

    const statusLabels = { pending: '⏳ معلق', confirmed: '✅ مؤكد', shipped: '🚚 تم الشحن', delivered: '📦 تم التوصيل', cancelled: '❌ ملغي' };
    const statusColors = { pending: 'bg-yellow-100 text-yellow-800', confirmed: 'bg-green-100 text-green-800', shipped: 'bg-blue-100 text-blue-800', delivered: 'bg-gray-100 text-gray-800', cancelled: 'bg-red-100 text-red-800' };

    async function loadOrders() {
      const { data } = await db.from('Order').select('*, OrderItem(*, Product(name))').order('createdAt', { ascending: false });
      document.getElementById('count-title').textContent = `الطلبات (${data?.length || 0})`;

      document.getElementById('orders-list').innerHTML = (data && data.length)
        ? data.map(o => `
          <div class="bg-white rounded-2xl shadow p-5">
            <div class="flex flex-wrap items-center justify-between gap-3 mb-3">
              <div>
                <span class="font-extrabold text-lg">#${o.id}</span>
                <span class="text-xs text-gray-400 mr-2">${new Date(o.createdAt).toLocaleDateString('ar-EG', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })}</span>
              </div>
              <div class="flex items-center gap-2">
                <span class="px-3 py-1 rounded-lg text-xs font-bold ${statusColors[o.status] || ''}">${statusLabels[o.status] || o.status}</span>
                <select onchange="updateStatus(${o.id}, this.value)" class="border rounded-lg px-2 py-1 text-xs">
                  ${Object.keys(statusLabels).map(s => `<option value="${s}" ${s === o.status ? 'selected' : ''}>${statusLabels[s]}</option>`).join('')}
                </select>
              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm mb-3">
              <div><span class="text-gray-400">👤</span> ${o.customerName}</div>
              <div><span class="text-gray-400">📞</span> <a href="tel:${o.phone}" class="text-primary-600">${o.phone}</a></div>
              <div><span class="text-gray-400">📍</span> ${o.address} - ${o.city}</div>
              ${o.notes ? `<div><span class="text-gray-400">📝</span> ${o.notes}</div>` : ''}
            </div>
            <div class="bg-gray-50 rounded-xl p-3 text-sm space-y-1">
              ${(o.OrderItem || []).map(i => `<div class="flex justify-between"><span>${i.Product?.name || 'منتج'} × ${i.quantity}</span><span class="font-bold">${(i.price * i.quantity).toFixed(0)} ${CURRENCY}</span></div>`).join('')}
              <hr class="my-1">
              <div class="flex justify-between font-extrabold"><span>الإجمالي</span><span class="text-primary-700">${o.total} ${CURRENCY}</span></div>
            </div>
            <a href="https://wa.me/${o.phone.startsWith('0') ? '2' + o.phone : o.phone}" target="_blank" class="inline-block mt-3 bg-green-500 hover:bg-green-600 text-white px-4 py-1.5 rounded-lg text-xs font-bold transition">📱 واتساب العميل</a>
          </div>`).join('')
        : '<p class="text-gray-400 text-center py-10">لا توجد طلبات</p>';
    }

    async function updateStatus(id, status) {
      await db.from('Order').update({ status }).eq('id', id);
      loadOrders();
    }

    loadOrders();
  </script>
</body>
</html>
