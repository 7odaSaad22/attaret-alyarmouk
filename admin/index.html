<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم — عطارة اليرموك</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d'},accent:{50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309',800:'#92400e',900:'#78350f'}}}}}</script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-100 text-gray-800">
  <nav class="bg-white shadow px-4 py-3 flex items-center justify-between">
    <span class="font-extrabold text-lg text-primary-700">🌿 لوحة التحكم</span>
    <div class="flex items-center gap-4 text-sm font-bold">
      <a href="/" class="hover:text-primary-600">الموقع ←</a>
      <button onclick="logout()" class="text-red-500 hover:text-red-700">خروج</button>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-10">
    <h1 class="text-2xl font-extrabold mb-8">مرحبًا بك في لوحة التحكم 👋</h1>

    <div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
      <div class="bg-white rounded-2xl shadow p-6 text-center"><div class="text-3xl mb-1" id="s-products">-</div><p class="text-sm text-gray-500">منتج</p></div>
      <div class="bg-white rounded-2xl shadow p-6 text-center"><div class="text-3xl mb-1" id="s-categories">-</div><p class="text-sm text-gray-500">تصنيف</p></div>
      <div class="bg-white rounded-2xl shadow p-6 text-center"><div class="text-3xl mb-1" id="s-orders">-</div><p class="text-sm text-gray-500">طلب</p></div>
      <div class="bg-white rounded-2xl shadow p-6 text-center"><div class="text-3xl mb-1" id="s-pending">-</div><p class="text-sm text-gray-500">طلب معلق</p></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <a href="/admin/products.html" class="bg-white rounded-2xl shadow p-6 hover:shadow-lg transition flex items-center gap-4">
        <div class="bg-primary-100 text-primary-700 p-3 rounded-xl text-2xl">📦</div>
        <div><h3 class="font-bold">إدارة المنتجات</h3><p class="text-sm text-gray-400">إضافة وتعديل وحذف المنتجات</p></div>
      </a>
      <a href="/admin/categories.html" class="bg-white rounded-2xl shadow p-6 hover:shadow-lg transition flex items-center gap-4">
        <div class="bg-accent-100 text-accent-700 p-3 rounded-xl text-2xl">📂</div>
        <div><h3 class="font-bold">إدارة التصنيفات</h3><p class="text-sm text-gray-400">إضافة وحذف التصنيفات</p></div>
      </a>
      <a href="/admin/orders.html" class="bg-white rounded-2xl shadow p-6 hover:shadow-lg transition flex items-center gap-4">
        <div class="bg-blue-100 text-blue-700 p-3 rounded-xl text-2xl">🧾</div>
        <div><h3 class="font-bold">إدارة الطلبات</h3><p class="text-sm text-gray-400">عرض وتحديث حالة الطلبات</p></div>
      </a>
      <a href="/admin/settings.html" class="bg-white rounded-2xl shadow p-6 hover:shadow-lg transition flex items-center gap-4">
        <div class="bg-gray-100 text-gray-700 p-3 rounded-xl text-2xl">⚙️</div>
        <div><h3 class="font-bold">الإعدادات</h3><p class="text-sm text-gray-400">تغيير كلمة المرور</p></div>
      </a>
    </div>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script>
    if (!localStorage.getItem('admin_logged')) location.href = '/admin/login.html';
    function logout() { localStorage.removeItem('admin_logged'); localStorage.removeItem('admin_id'); location.href = '/admin/login.html'; }

    (async () => {
      const { count: pc } = await db.from('Product').select('*', { count: 'exact', head: true });
      const { count: cc } = await db.from('Category').select('*', { count: 'exact', head: true });
      const { count: oc } = await db.from('Order').select('*', { count: 'exact', head: true });
      const { count: pn } = await db.from('Order').select('*', { count: 'exact', head: true }).eq('status', 'pending');
      document.getElementById('s-products').textContent = pc || 0;
      document.getElementById('s-categories').textContent = cc || 0;
      document.getElementById('s-orders').textContent = oc || 0;
      document.getElementById('s-pending').textContent = pn || 0;
    })();
  </script>
</body>
</html>
