<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التصنيفات — عطارة اليرموك</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d'},accent:{50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309',800:'#92400e',900:'#78350f'}}}}}</script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50 text-gray-800">
  <div id="navbar"></div>
  <main class="max-w-7xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-extrabold mb-8">التصنيفات</h1>
    <div id="cats-grid" class="grid grid-cols-2 md:grid-cols-3 gap-6"><div class="loader col-span-full"></div></div>
  </main>
  <div id="footer"></div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    initPage();
    (async () => {
      const { data: cats } = await db.from('Category').select('*, Product(id)');
      document.getElementById('cats-grid').innerHTML = (cats && cats.length)
        ? cats.map(c => `<a href="/category.html?slug=${c.slug}" class="bg-white rounded-2xl shadow hover:shadow-lg transition p-8 text-center group">
            <div class="text-5xl mb-3">${c.image||'🌿'}</div>
            <h3 class="font-bold text-lg group-hover:text-primary-700 transition mb-1">${c.name}</h3>
            <p class="text-sm text-gray-400">${c.Product?.length || 0} منتج</p>
            <p class="text-xs text-gray-400 mt-1">${c.description||''}</p>
          </a>`).join('')
        : '<p class="text-gray-400 text-center col-span-full py-20">لا توجد تصنيفات</p>';
    })();
  </script>
</body>
</html>
